<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herramientas PDF</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: #ffffff;
            width: 100%;
            max-width: 520px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }

        /* Sistema de Pestañas Minimalista */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 32px;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 12px;
        }

        .tab-btn {
            background: none;
            border: none;
            font-size: 15px;
            font-weight: 500;
            color: #666666;
            cursor: pointer;
            padding: 4px 12px;
            position: relative;
            width: auto;
            transition: color 0.2s;
        }

        .tab-btn.active {
            color: #0f172a;
            font-weight: 600;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -13px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #0f172a;
        }

        .tab-content {
            display: none;
            text-align: center;
        }

        .tab-content.active {
            display: block;
        }

        h2 {
            font-size: 22px;
            font-weight: 600;
            color: #111111;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: #666666;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .upload-area {
            position: relative;
            border: 1px dashed #e0e0e0;
            border-radius: 8px;
            padding: 32px 20px;
            background-color: #fcfcfc;
            margin-bottom: 24px;
            transition: border-color 0.2s, background-color 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .upload-area:hover {
            border-color: #b5b5b5;
            background-color: #f7f7f7;
        }

        .upload-icon {
            font-size: 24px;
            color: #999999;
            margin-bottom: 8px;
        }

        .upload-text {
            font-size: 14px;
            color: #555555;
            font-weight: 500;
        }

        input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* Lista de archivos para ordenar */
        .file-list {
            text-align: left;
            margin-bottom: 24px;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #f0f0f0;
            border-radius: 6px;
            padding: 8px;
            background: #fbfbfb;
            display: none;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
            margin-bottom: 6px;
            font-size: 13px;
        }

        .file-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 70%;
        }

        .file-actions {
            display: flex;
            gap: 4px;
        }

        .order-btn {
            background: #f1f5f9;
            color: #334155;
            border: none;
            padding: 4px 8px;
            font-size: 11px;
            border-radius: 3px;
            cursor: pointer;
            width: auto;
        }

        .order-btn:hover {
            background: #e2e8f0;
        }

        button.action-btn {
            width: 100%;
            background-color: #0f172a;
            color: #ffffff;
            border: none;
            padding: 14px 24px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button.action-btn:hover {
            background-color: #1e293b;
        }

        button.action-btn:active {
            transform: scale(0.99);
        }

        button.action-btn:disabled {
            background-color: #e2e8f0;
            color: #94a3b8;
            cursor: not-allowed;
            transform: none;
        }

        .status-box {
            margin-top: 24px;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 13px;
            line-height: 1.4;
            display: none;
            text-align: center;
        }

        .info { background-color: #f1f5f9; color: #475569; }
        .success { background-color: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        .error { background-color: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    </style>
</head>
<body>

<div class="card">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('tab-dividir')">Dividir PDFs</button>
        <button class="tab-btn" onclick="switchTab('tab-unir')">Unir PDFs</button>
    </div>

    <div id="tab-dividir" class="tab-content active">
        <h2>Divisor de PDFs</h2>
        <p class="subtitle">Sube tus archivos. Se agruparán cada 2 páginas y se descargarán en carpetas dentro de un .ZIP</p>
        
        <div class="upload-area">
            <div class="upload-icon">📁</div>
            <div class="upload-text" id="div-label">Seleccionar o arrastrar PDFs</div>
            <input type="file" id="div-file" accept=".pdf" multiple>
        </div>
        <button id="btn-dividir" class="action-btn">Procesar y descargar ZIP</button>
        <div id="status-dividir" class="status-box"></div>
    </div>

    <div id="tab-unir" class="tab-content">
        <h2>Unidor de PDFs</h2>
        <p class="subtitle">Sube los archivos y acomoda el orden usando los botones antes de fusionarlos en uno solo.</p>
        
        <div class="upload-area">
            <div class="upload-icon">➕</div>
            <div class="upload-text" id="unir-label">Seleccionar archivos a unir</div>
            <input type="file" id="unir-file" accept=".pdf" multiple>
        </div>
        
        <div class="file-list" id="lista-archivos"></div>

        <button id="btn-unir" class="action-btn">Fusionar y descargar PDF</button>
        <div id="status-unir" class="status-box"></div>
    </div>
</div>
