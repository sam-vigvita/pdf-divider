<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divisor de PDFs</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: #ffffff;
            width: 100%;
            max-width: 480px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            text-align: center;
        }

        h2 {
            font-size: 22px;
            font-weight: 600;
            color: #111111;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: #666666;
            line-height: 1.5;
            margin-bottom: 32px;
        }

        .upload-area {
            position: relative;
            border: 1px dashed #e0e0e0;
            border-radius: 8px;
            padding: 32px 20px;
            background-color: #fcfcfc;
            margin-bottom: 24px;
            transition: border-color 0.2s, background-color 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .upload-area:hover {
            border-color: #b5b5b5;
            background-color: #f7f7f7;
        }

        .upload-icon {
            font-size: 24px;
            color: #999999;
            margin-bottom: 8px;
        }

        .upload-text {
            font-size: 14px;
            color: #555555;
            font-weight: 500;
        }

        /* Ocultar el input original pero mantenerlo funcional */
        input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        button {
            width: 100%;
            background-color: #0f172a;
            color: #ffffff;
            border: none;
            padding: 14px 24px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: #1e293b;
        }

        button:active {
            transform: scale(0.99);
        }

        button:disabled {
            background-color: #e2e8f0;
            color: #94a3b8;
            cursor: not-allowed;
            transform: none;
        }

        #status {
            margin-top: 24px;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 13px;
            line-height: 1.4;
            display: none;
            text-align: center;
        }

        .info { 
            background-color: #f1f5f9; 
            color: #475569; 
        }
        
        .success { 
            background-color: #f0fdf4; 
            color: #166534; 
            border: 1px solid #bbf7d0;
        }
        
        .error { 
            background-color: #fef2f2; 
            color: #991b1b; 
            border: 1px solid #fecaca;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Divisor de PDFs</h2>
    <p class="subtitle">Los archivos se agruparán cada 2 páginas y se descargarán automáticamente en un único archivo comprimido .ZIP</p>
    
    <div class="upload-area">
        <div class="upload-icon">📄</div>
        <div class="upload-text" id="file-label">Seleccionar o arrastrar PDF</div>
        <input type="file" id="pdf-file" accept=".pdf">
    </div>

    <button id="btn-procesar">Procesar y descargar ZIP</button>

    <div id="status"></div>
</div>
